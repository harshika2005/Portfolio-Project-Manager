<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Project Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🚀 Portfolio Project Manager</h1>

    <div class="form-box">
        <input type="text" id="title" placeholder="Project Title">
        <input type="text" id="technology" placeholder="Technology Stack">
        <input type="text" id="github" placeholder="GitHub Link">
        <textarea id="description" placeholder="Project Description"></textarea>

        <button id="addBtn">Add Project</button>
    </div>

    <h2>📁 Admin Dashboard</h2>
    <div id="projectList"></div>
</div>

<script src="script.js"></script>
</body>
</html>
